<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Attendance Dashboard</h1>

    <div class="overall-box">
        <h2 id="overall">Overall Attendance: 0%</h2>
    </div>

    <div class="form-section">
        <input type="text" id="subjectName" placeholder="Subject Name">
        <input type="number" id="totalClasses" placeholder="Total Classes">
        <input type="number" id="attendedClasses" placeholder="Classes Attended">
        <button id="mainBtn" onclick="addSubject()">Add Subject</button>
    </div>

    <div id="subjectsList" class="subjects-grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
